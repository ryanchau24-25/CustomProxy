<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create an account for CustomProxy search engine and save recent searches." />
  <title>Sign Up | CustomProxy</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <h2>Create account</h2>
      <p>Join CustomProxy and keep your searches handy.</p>
      <form id="signup-form" class="auth-form">
        <label>Name</label>
        <input id="displayName" type="text" required />
        <label>Email</label>
        <input id="email" type="email" required />
        <label>Password</label>
        <input id="password" type="password" required minlength="6" />
        <button type="submit" class="primary-btn">Sign Up</button>
      </form>
      <p class="auth-note">Already have an account? <a href="/login">Login</a></p>
      <p id="auth-error" class="auth-error"></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
