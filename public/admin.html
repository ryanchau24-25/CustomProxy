<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CustomProxy admin dashboard to manage users and search activity." />
  <title>Admin Dashboard | CustomProxy</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="admin-shell">
    <header class="admin-header">
      <div>
        <h1>Admin dashboard</h1>
        <p>Manage users and monitor recent search activity.</p>
      </div>
      <a class="primary-btn" href="/">Back to Search</a>
    </header>

    <section class="admin-panel">
      <div class="admin-card">
        <h2>Users</h2>
        <div id="user-table" class="table-list"></div>
      </div>
      <div class="admin-card">
        <h2>Recent Search Activity</h2>
        <div id="search-history" class="table-list"></div>
      </div>
    </section>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
